name: CI / Publish

on:
  push:
    branches: [ main ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────
  # 1. ТЕСТЫ
  #    Добавляй свои тесты сюда.
  #    Если тестов пока нет — джоб просто проходит.
  # ─────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── МЕСТО ДЛЯ ТЕСТОВ ────────────────────
      # Пример с pytest (раскомментируй когда будут тесты):
      #
      # - name: Run tests
      #   run: pytest tests/ -v
      #
      # Пример с unittest:
      #
      # - name: Run tests
      #   run: python -m unittest discover -s tests -v
      # ────────────────────────────────────────

      - name: Placeholder (no tests yet)
        run: echo "No tests configured yet — skipping."

  # ─────────────────────────────────────────────
  # 2. СБОРКА
  #    Проверяем, что проект запускается без ошибок.
  # ─────────────────────────────────────────────
  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile srv.py
          python -m py_compile loader.py
          python -m py_compile thumbnail.py
          python -m py_compile sql.py
          echo "All files compiled without errors."

  # ─────────────────────────────────────────────
  # 3. PUBLISH — создаёт GitHub Release
  #    Срабатывает только при пуше тега v*.*.*
  #    Пример: git tag v1.0.0 && git push --tags
  # ─────────────────────────────────────────────
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create release archive
        run: |
          zip -r UltiaStream-${{ github.ref_name }}.zip . \
            --exclude "*.git*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "venv/*" \
            --exclude "videos/*" \
            --exclude "thumbnail/*" \
            --exclude "users.db"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "UltiaStream ${{ github.ref_name }}"
          body: |
            ## UltiaStream ${{ github.ref_name }}

            Самостоятельный видеохостинг на Flask с GPU-транскодированием (NVIDIA NVENC/CUDA).

            ### Установка
            ```bash
            git clone https://github.com/GameFriendsTeam/UltiaStream.git
            cd UltiaStream
            pip install -r requirements.txt
            python srv.py
            ```

            ### Что нового
            <!-- Опиши изменения вручную или подключи генератор changelog -->
          files: UltiaStream-${{ github.ref_name }}.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
