name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string
      release_notes:
        description: "Release notes"
        required: false
        default: ""
        type: string

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke-check imports
        run: |
          python -c "import thumbnail"
          python -c "import loader"
          python -c "import rtmp"
          python -c "import updater"
          python -c "import utils"
          python -c "import srv"
        env:
          FLASK_ENV: testing

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build release archive
        run: |
          VERSION="${{ github.event.inputs.version }}"
          zip -r "ultrastream-${VERSION}.zip" . \
            --exclude "*.git*" \
            --exclude "*.pyc" \
            --exclude "__pycache__/*" \
            --exclude "venv/*" \
            --exclude "videos/*" \
            --exclude "thumbnail/*" \
            --exclude "users.db"
          echo "ARCHIVE=ultrastream-${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "UltraStream ${{ github.event.inputs.version }}"
          body: |
            ## UltraStream ${{ github.event.inputs.version }}

            ${{ github.event.inputs.release_notes }}

            ---
            **Установка:**
            ```bash
            pip install -r requirements.txt
            python srv.py
            ```

            > Требуется Python 3.10+, ffmpeg/ffprobe в PATH.
            > Для GPU-транскодирования — NVIDIA с NVENC/CUDA.
          files: ${{ env.ARCHIVE }}
          draft: false
          prerelease: ${{ contains(github.event.inputs.version, 'alpha') || contains(github.event.inputs.version, 'beta') || contains(github.event.inputs.version, 'rc') }}